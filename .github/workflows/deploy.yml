name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare Pages Directory
        run: |
          mkdir public
          cp index.html style.css app.js translator.js transliterate.js public/
          touch public/.nojekyll
      - name: Configure GitHub Pages Hosting Environment
        uses: actions/configure-pages@v5
      - name: Upload Static Portal Files Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'
      - name: Deploy Live Artifact Payload to Target Environment
        id: deployment
        uses: actions/deploy-pages@v4
